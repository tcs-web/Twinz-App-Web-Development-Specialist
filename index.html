<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twinz V3.0.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<style>
body{background:#0a0a0a;color:#f1f5f9;font-family:sans-serif;padding:16px;max-width:1000px;margin:0 auto}
.card{background:#111827;border-radius:18px;padding:22px;margin-bottom:18px;border:1px solid #1f2937}
input,button{width:100%;padding:15px;border-radius:12px;border:1px solid #374151;background:#0a0a0a;color:#f1f5f9;font-size:16px;margin-bottom:10px}
button{background:#2563eb;font-weight:700;cursor:pointer;touch-action: manipulation;}
.btn-green{background:#16a34a}.hidden{display:none}.logo{width:48px;height:48px;border-radius:12px}
.tabs{display:flex;gap:8px}.tab{flex:1;padding:11px;background:#1f2937;border-radius:10px;text-align:center;cursor:pointer;touch-action: manipulation;}
.tab.active{background:#2563eb}
</style>
</head>
<body>

<div id="login" class="card">
  <h1><img src="https://files.catbox.moe/0zympr.jpeg" class="logo"> Twinz Login</h1>
  <input type="email" id="email" value="twinz.cooperate.services@gmail.com">
  <input type="password" id="pass" placeholder="Password">
  <button id="loginBtn" class="btn-green">Login</button>
  <div id="err" style="color:#dc2626;font-weight:700"></div>
</div>

<div id="app" class="hidden">
  <h1><img src="https://files.catbox.moe/0zympr.jpeg" class="logo"> Twinz V3.0.0</h1>
  <button id="logoutBtn" style="background:#dc2626;width:auto">Logout</button>
  <div class="tabs">
    <div class="tab active" onclick="show('dash')">Dashboard</div>
    <div class="tab" onclick="show('inv')">Invoices</div>
  </div>
  <div id="dash" class="card">Dashboard Ready. Add your V2.4.6 modules here.</div>
  <div id="inv" class="card hidden">Invoice Module Ready.</div>
</div>

<script>
// PASTE YOUR 6 KEYS HERE FROM STEP 1.6
const firebaseConfig = {
  apiKey: "AIzaSyBJP71gaIqvJi2QZSJBIWEMMzda2jhcpW8",
  authDomain: "twinz-app-and-web-specialist.firebaseapp.com",
  projectId: "twinz-app-and-web-specialist",
  storageBucket: "twinz-app-and-web-specialist.firebasestorage.app",
  messagingSenderId: "457882091771",
  appId: "1:457882091771:web:9e6b54ca264c6c2803f05e"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(u => {if(u){login.classList.add('hidden'); app.classList.remove('hidden');}else{login.classList.remove('hidden'); app.classList.add('hidden');}});
loginBtn.onclick = async ()=>{err.textContent='Logging in...'; try{await auth.signInWithEmailAndPassword(email.value.trim(), pass.value);}catch(e){err.textContent='ERROR: '+e.code;}};
logoutBtn.onclick = ()=>auth.signOut();
function show(id){document.querySelectorAll('#app>.card').forEach(c=>c.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); event.target.classList.add('active');}
</script>
</body>
</html>
