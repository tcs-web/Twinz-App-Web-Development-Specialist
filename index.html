<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twinz Cooperate - GOD TIER v2.4.7-FINAL</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#0a0a0a;color:#f1f5f9;padding:16px;max-width:1000px;margin:0 auto}
.card{background:#111827;border-radius:18px;padding:22px;margin-bottom:18px;border:1px solid #1f2937}
button{background:#2563eb;color:white;border:none;padding:15px 22px;border-radius:12px;font-weight:700;font-size:16px;cursor:pointer;width:100%;touch-action: manipulation;}
.btn-green{background:#16a34a}.hidden{display:none}
input{width:100%;padding:13px;border-radius:10px;border:1px solid #374151;background:#0a0a0a;color:#f1f5f9;margin-bottom:11px;font-size:16px}
.logo{width:48px;height:48px;border-radius:12px}
</style>
</head>
<body>

<div id="loginScreen" class="card">
  <h1><img src="https://files.catbox.moe/0zympr.jpeg" class="logo"> Twinz Admin</h1>
  <input type="email" id="email" value="twinz.cooperate.services@gmail.com">
  <input type="password" id="password" placeholder="Password">
  <button id="loginBtn" class="btn-green">Login</button>
  <div id="loginError" style="color:#dc2626;margin-top:8px;font-size:14px;font-weight:700"></div>
</div>

<div id="appScreen" class="hidden">
  <h1>LOGGED IN ✅ Twinz Cooperate</h1>
  <button id="logoutBtn" style="background:#dc2626;width:auto">Logout</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBJP71gaIqvJi2QZSJBIWEMMzda2jhcpW8",
  authDomain: "twinz-app-and-web-specialist.firebaseapp.com",
  projectId: "twinz-app-and-web-specialist",
  storageBucket: "twinz-app-and-web-specialist.firebasestorage.app",
  messagingSenderId: "457882091771",
  appId: "1:457882091771:web:9e6b54ca264c6c2803f05e"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

auth.onAuthStateChanged(user => {
  if(user){
    loginScreen.classList.add('hidden');
    appScreen.classList.remove('hidden');
  } else {
    loginScreen.classList.remove('hidden');
    appScreen.classList.add('hidden');
  }
});

document.getElementById('loginBtn').addEventListener('click', async ()=>{
  loginError.textContent='Attempting login...';
  try{
    await auth.signInWithEmailAndPassword(document.getElementById('email').value.trim(), document.getElementById('password').value);
    loginError.textContent='SUCCESS';
  }catch(e){
    loginError.textContent='ERROR: ' + e.code; // THIS WILL TELL US THE TRUTH
    console.log(e);
  }
});
document.getElementById('logoutBtn').addEventListener('click', ()=>auth.signOut());
</script>
</body>
</html>
