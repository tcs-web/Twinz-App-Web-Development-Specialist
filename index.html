<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- REMOVED user-scalable=no -->
<title>Twinz Cooperate - GOD TIER v2.4.8</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#0a0a0a;color:#f1f5f9;padding:16px;max-width:1000px;margin:0 auto}
.card{background:#111827;border-radius:18px;padding:22px;margin-bottom:18px;border:1px solid #1f2937;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
h1{font-size:26px;margin-bottom:6px;color:#3b82f6;display:flex;align-items:center;gap:12px}
.logo{width:48px;height:48px;border-radius:12px;object-fit:cover;border:2px solid #3b82f6}
.sub{color:#9ca3af;font-size:13px;margin-bottom:18px}
input{width:100%;padding:13px;border-radius:10px;border:1px solid #374151;background:#0a0a0a;color:#f1f5f9;margin-bottom:11px;font-size:16px}
button{background:#2563eb;color:white;border:none;padding:15px 22px;border-radius:12px;font-weight:700;font-size:16px;cursor:pointer;width:100%;touch-action: manipulation;} /* ADDED touch-action */
.btn-green{background:#16a34a}.btn-gray{background:#4b5563}
.hidden{display:none}
</style>
</head>
<body>
  
<div id="loginScreen" class="card">
  <h1><img src="https://files.catbox.moe/0zympr.jpeg" class="logo"> Twinz Admin</h1>
  <div class="sub">Login to access GOD TIER backend</div>
  <input type="email" id="email" placeholder="twinz.cooperate.services@gmail.com" autocomplete="email">
  <input type="password" id="password" placeholder="Password" autocomplete="current-password">
  <button id="loginBtn" class="btn-green">Login</button> <!-- REMOVED onclick -->
  <div id="loginError" style="color:#dc2626;margin-top:8px;font-size:13px"></div>
</div>

<div id="appScreen" class="hidden">
  <h1>Logged In ✅</h1> <button id="logoutBtn" class="btn-gray">Logout</button>
</div>

<script>
alert('JS V17 Running'); // Test 1

const firebaseConfig = {
  apiKey: "AIzaSyBJP71gaIqvJi2QZSJBIWEMMzda2jhcpW8",
  authDomain: "twinz-app-and-web-specialist.firebaseapp.com",
  projectId: "twinz-app-and-web-specialist",
  storageBucket: "twinz-app-and-web-specialist.firebasestorage.app",
  messagingSenderId: "457882091771",
  appId: "1:457882091771:web:9e6b54ca264c6c2803f05e"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

const loginScreen = document.getElementById('loginScreen');
const appScreen = document.getElementById('appScreen');
const loginBtn = document.getElementById('loginBtn'); // Get button by ID
const logoutBtn = document.getElementById('logoutBtn');

auth.onAuthStateChanged(user => {
  if(user){
    loginScreen.classList.add('hidden');
    appScreen.classList.remove('hidden');
  } else {
    loginScreen.classList.remove('hidden');
    appScreen.classList.add('hidden');
  }
});

// NO MORE onclick. We bind it in JS after DOM loads
loginBtn.addEventListener('click', async () => {
  alert('Login clicked V17'); // Test 2. This MUST pop now
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value;
  document.getElementById('loginError').textContent = 'Logging in...'; 
  try{
    await auth.signInWithEmailAndPassword(email, pass);
    alert('Firebase Success!'); 
  }catch(e){
    alert('Firebase Error: ' + e.code); 
    document.getElementById('loginError').textContent = e.code; 
  }
});
logoutBtn.addEventListener('click', () => auth.signOut());
</script>
</body>
</html>
